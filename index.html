        .min { width: 5px; height: 90px; background: #eee; z-index: 2; }

        .center { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; background: #d4af37; border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; }
    </style>
